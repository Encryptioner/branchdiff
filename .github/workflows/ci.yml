name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: ['20', '22']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

      - name: Verify build artifacts
        run: |
          test -f packages/cli/dist/index.js || (echo "missing packages/cli/dist/index.js" && exit 1)
          test -f packages/cli/dist/ui/client/index.html || (echo "missing bundled UI" && exit 1)
          ls -la packages/cli/dist

      - name: Dry-run pack
        working-directory: packages/cli
        run: npm pack --dry-run
