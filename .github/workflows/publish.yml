name: Publish to NPM

# Fires when a version tag is pushed (v0.1.0, v1.2.3, etc.).
# Also allows manual re-publish from the Actions tab for a specific tag.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g., v0.1.0)'
        required: false
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # create GitHub release
      id-token: write   # NPM provenance

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run typecheck

      - name: Build (parser → git → github → ui → cli)
        run: pnpm run build

      - name: Verify build artifacts
        run: |
          test -f packages/cli/dist/index.js || (echo "missing packages/cli/dist/index.js" && exit 1)
          test -f packages/cli/dist/ui/client/index.html || (echo "missing bundled UI" && exit 1)
          test -f packages/cli/README.md
          test -f packages/cli/LICENSE.md
          test -f packages/cli/CHANGELOG.md
          ls -la packages/cli/dist

      - name: Extract version from tag
        id: extract_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing $VERSION (tag $TAG)"

      - name: Verify package.json version matches tag
        run: |
          PKG_VERSION=$(node -p "require('./packages/cli/package.json').version")
          TAG_VERSION="${{ steps.extract_version.outputs.version }}"
          echo "packages/cli/package.json: $PKG_VERSION  tag: $TAG_VERSION"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Version mismatch — tag=$TAG_VERSION but packages/cli/package.json=$PKG_VERSION"
            exit 1
          fi

      - name: Dry-run pack (what ships)
        working-directory: packages/cli
        run: npm pack --dry-run

      - name: Configure npm auth
        run: |
          cat << 'EOF' > "$HOME/.npmrc"
          //registry.npmjs.org/:_authToken=${NPM_TOKEN}
          EOF
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to NPM with provenance
        working-directory: packages/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm publish --no-git-checks --access public --provenance

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
